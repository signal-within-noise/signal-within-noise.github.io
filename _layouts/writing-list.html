---
layout: default
---
<div class="wrap">
  <section style="border-top:none;">
    <div class="section-label">writing</div>
    {% if content and content != "" %}<div class="page-content" style="padding-top:0;border-top:none;">{{ content }}</div>{% endif %}
    {% for post in site.posts %}
    <a class="panel" href="{{ post.url | relative_url }}">
      <div class="panel-body">
        <div class="tag">{{ post.date | date: "%b %Y" }}</div>
        <h3>{{ post.title }}</h3>
        {% if post.excerpt %}<p>{{ post.excerpt | strip_html | truncate: 140 }}</p>{% endif %}
      </div>
    </a>
    {% endfor %}
  </section>
</div>
