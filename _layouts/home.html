---
layout: default
---
<header class="hero">
  <div class="wrap">
    {% if page.eyebrow %}<div class="eyebrow">{{ page.eyebrow }}</div>{% endif %}
    <h1>{{ page.headline }}</h1>
    <div class="page-content" style="padding:0;border-top:none;">
      {{ content }}
    </div>
    {% if page.credentials %}<div class="credentials">{{ page.credentials }}</div>{% endif %}
    <div class="links">
      {% for link in page.links %}
        <a href="{{ link.url }}">{{ link.label }} ↗</a>
      {% endfor %}
    </div>
  </div>
</header>
